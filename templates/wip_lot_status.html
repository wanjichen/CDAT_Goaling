<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIP Lot Status Chart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wip-lot-status.css') }}">
</head>

<body>
    <div class="header">
        <h2>WIP Lot Status</h2>
        <a class="back-link" href="{{ url_for('index') }}">Back to Goaling</a>
    </div>

    <div class="page">
        {% if not csv_found %}
        <div class="card empty">File not found: <code>UI/data/WIP_LOT_STATUS.csv</code></div>
        {% elif not rows %}
        <div class="card empty">CSV was found, but no numeric <code>CURRENT_WIP</code> values were available.</div>
        {% else %}
        <div class="card filters">
            <div class="filter-block">
                <label>Product Filter</label>
                <div id="productFilter" class="checkbox-list">
                    <label class="checkbox-item"><input type="checkbox" id="prod-all" checked>All Products</label>
                    <div class="filter-actions">
                        <button type="button" id="btn-product-select-all" class="filter-btn">Select All</button>
                        <button type="button" id="btn-product-clear-all" class="filter-btn">Clear All</button>
                    </div>
                    <div id="productList"></div>
                </div>
            </div>
            <div class="filter-block">
                <label>Operation Filter</label>
                <div id="operationFilter" class="checkbox-list">
                    <label class="checkbox-item"><input type="checkbox" id="op-all" checked>All Operations</label>
                    <div class="filter-actions">
                        <button type="button" id="btn-select-all" class="filter-btn">Select All</button>
                        <button type="button" id="btn-clear-all" class="filter-btn">Clear All</button>
                    </div>
                    <div id="operationList"></div>
                </div>
            </div>
        </div>
        <div class="card">
            <div id="wip-chart"></div>
        </div>
        {% endif %}
    </div>

    {% if csv_found and rows %}
    <script>
        window.__WIP_ROWS__ = {{ rows | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/wip-lot-status.js') }}"></script>
    {% endif %}
</body>

</html>
